name: 'AtoM'

services:
  atom:
    image: ghcr.io/tyler-regan/atom-docker:v2.10.1
    depends_on:
      atom_init:
        condition: service_completed_successfully
      cache:
        condition: service_healthy
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      gearmand:
        condition: service_healthy
    volumes:
      - atom_uploads:/atom/src/uploads:rw
    env_file:
      - .env
    ports:
      - '0.0.0.0:${ATOM_PORT:-8080}:80'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      timeout: 10s
      retries: 5
      interval: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: ${ATOM_PHP_MEMORY_LIMIT:-512m}
        reservations:
          cpus: '0.50'
          memory: ${ATOM_PHP_MEMORY_LIMIT:-512m}
    tmpfs:
      - /atom/src/cache:mode=770,uid=1000,gid=1000

  atom_init:
    image: ghcr.io/tyler-regan/atom-docker:v2.10.1
    depends_on:
      cache:
        condition: service_healthy
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      gearmand:
        condition: service_healthy
    volumes:
      - atom_uploads:/atom/src/uploads:rw
    env_file:
      - .env
    command: init
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1g
        reservations:
          cpus: '0.50'
          memory: 1g
    tmpfs:
      - /atom/src/cache:mode=770,uid=1000,gid=1000

  atom_worker:
    image: ghcr.io/tyler-regan/atom-docker:v2.10.1
    depends_on:
      atom_init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      gearmand:
        condition: service_healthy
    volumes:
      - atom_uploads:/atom/src/uploads:rw
    env_file:
      - .env
    command: worker
    restart: on-failure:5
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 64m
        reservations:
          cpus: '0.25'
          memory: 64m
    tmpfs:
      - /atom/src/cache:mode=770,uid=1000,gid=1000

  cache:
    image: memcached:1.6-alpine
    command:
      - memcached
      - -m
      - "${MEMCACHED_MEMORY:-256}"
      - -p
      - "11211"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "sh", "-c", "echo stats | nc localhost 11211 | head -1" ]
      timeout: 3s
      retries: 5
      interval: 5s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 32m
        reservations:
          cpus: '0.25'
          memory: 32m

  db:
    image: percona/percona-server:8.4
    volumes:
      - mysql_data:/var/lib/mysql:rw
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-atom_db}
      MYSQL_USER: ${MYSQL_USER:-atom_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-atompassword}
      PERCONA_TELEMETRY_DISABLE: 1
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --max_allowed_packet=${MYSQL_MAX_ALLOWED_PACKET:-64M}
      - --innodb_buffer_pool_size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-256M}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
      interval: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1g
        reservations:
          cpus: '0.50'
          memory: 1g

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-oss:7.10.2
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:- -Xms512m -Xmx512m}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1" ]
      timeout: 10s
      retries: 5
      interval: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 2g
        reservations:
          cpus: '0.25'
          memory: 2g
    ulimits:
      memlock:
        soft: -1
        hard: -1

  gearmand:
    image: artefactual/gearmand:1.1.22.1-alpine
    volumes:
      - gearman_data:/var/lib/gearmand
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "sh", "-c", "echo status | nc localhost 4730 | head -1" ]
      timeout: 3s
      retries: 5
      interval: 5s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 6m
        reservations:
          cpus: '0.25'
          memory: 6m

volumes:
  mysql_data:
    driver: local
  gearman_data:
    driver: local
  elasticsearch_data:
    driver: local
  atom_uploads:
    driver: local
